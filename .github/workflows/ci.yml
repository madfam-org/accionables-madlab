name: CI/CD Pipeline

# Quality gate for the monorepo. Every job below runs on both push-to-main
# and pull-requests so that lint/type-check/test drift on main is caught
# immediately (the previous monolithic "lint" job let TypeScript errors slip
# through via continue-on-error, which is why we ended up with a 711-error
# baseline before #15).
#
# Workspace coverage is intentionally explicit: server and client each get
# their own lint, type-check, and test jobs so a single failure surfaces as
# a single named status check that branch protection can require.

on:
  push:
    branches: [main, develop, 'claude/**']
  pull_request:
    branches: [main, develop]

jobs:
  # ─── apps/server ──────────────────────────────────────────────────────────
  server-lint:
    name: Server Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: ESLint (apps/server)
        run: npm run lint --workspace=apps/server

  server-type-check:
    name: Server Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: tsc --noEmit (apps/server)
        run: npm run type-check --workspace=apps/server

  server-test:
    name: Server Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Vitest (apps/server)
        run: npm run test --workspace=apps/server

  # ─── apps/client ──────────────────────────────────────────────────────────
  client-lint:
    name: Client Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: ESLint (apps/client)
        run: npm run lint --workspace=apps/client

  client-type-check:
    name: Client Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: tsc --noEmit (apps/client)
        run: npm run type-check --workspace=apps/client

  client-test:
    name: Client Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Vitest (apps/client)
        run: npm run test --workspace=apps/client -- --run
      - name: Generate coverage report
        run: npm run test:coverage --workspace=apps/client -- --run
        continue-on-error: true
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: apps/client/coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

  # ─── E2E + Build ──────────────────────────────────────────────────────────
  # E2E runs against a real Postgres + Fastify server stack. Wave 0–2 gated
  # every CRUD route on verifyJWT, and the Playwright suite under
  # apps/client/e2e/ uses storageState seeded with the dev-mock token. Without
  # a real DB + API, the dev-mock token has nothing to authenticate against.
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      # Single DB process — no inter-container DNS, no docker-compose drift,
      # no per-run image build cost. GHA manages the healthcheck for us.
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: madlab
          POSTGRES_PASSWORD: madlab
          POSTGRES_DB: madlab
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U madlab"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://madlab:madlab@localhost:5432/madlab
      # NODE_ENV=development is required for two reasons:
      #   1. assertJanuaConfiguredIfProduction is a no-op (no JANUA_* vars
      #      needed in CI — the dev-mock token bypasses real auth).
      #   2. verifyJWT honors the `dev-token-mock-user` storage-state seed.
      NODE_ENV: development
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Apply database schema
        run: npm run db:push --workspace=apps/server
      - name: Seed database
        run: npm run seed --workspace=apps/server
        continue-on-error: true # legacy task imports may fail-soft; phases/users/projects always succeed
      - name: Start API server in background
        run: |
          npm run dev --workspace=apps/server > /tmp/server.log 2>&1 &
          echo "$!" > /tmp/server.pid
      - name: Wait for /api/health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3001/api/health > /dev/null 2>&1; then
              echo "API is up after $i attempts"
              exit 0
            fi
            sleep 2
          done
          echo "API never came up. Server log:"
          cat /tmp/server.log
          exit 1
      - name: Run E2E tests
        run: npm run test:e2e --workspace=apps/client
        env:
          CI: true
      - name: Stop API server
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill "$(cat /tmp/server.pid)" 2>/dev/null || true
          fi
      - name: Dump server log on failure
        if: failure()
        run: cat /tmp/server.log || true
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/client/playwright-report/
          retention-days: 30
      - name: Upload server log
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: server-log
          path: /tmp/server.log
          retention-days: 7

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs:
      [
        server-lint,
        server-type-check,
        server-test,
        client-lint,
        client-type-check,
        client-test,
      ]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build all workspaces
        run: npm run build
      - name: Check build size
        run: |
          echo "Client build size:" && du -sh apps/client/dist/ || true
          echo "Server build size:" && du -sh apps/server/dist/ || true
      - name: Upload client build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: apps/client/dist/
          retention-days: 7

  deploy-preview:
    name: Deploy Preview (Vercel)
    runs-on: ubuntu-latest
    needs: [build, e2e]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build
          path: dist/
      - name: Deploy to Vercel (Preview)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./
        continue-on-error: true

  deploy-production:
    name: Deploy to Production (Vercel)
    runs-on: ubuntu-latest
    needs: [build, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build
          path: dist/
      - name: Deploy to Vercel (Production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./
        continue-on-error: true
