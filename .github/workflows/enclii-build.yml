name: Enclii build & publish

# GitOps flow: push → build image(s) → cosign sign → push to GHCR → commit digest to
# infra/k8s/production/kustomization.yaml → ArgoCD auto-syncs the new digest to the cluster.
#
# Image naming: ghcr.io/madfam-org/accionables-madlab-<svc>:<sha>  (+ digest pin for kustomize)
# Follows the MADFAM internal-devops pattern used by routecraft / karafiel / autoswarm.

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'infra/k8s/production/**'
      - '.github/workflows/enclii-build.yml'
  workflow_dispatch:
    inputs:
      services:
        description: 'Comma-separated list of services to rebuild (empty = all)'
        required: false
        default: ''

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  detect-changes:
    name: Detect changed services
    runs-on: ${{ vars.ARC_BOOTSTRAP_COMPLETE == 'true' && 'madfam-runners-blue' || 'ubuntu-latest' }}
    outputs:
      matrix: ${{ steps.filter.outputs.matrix }}
      any: ${{ steps.filter.outputs.any }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Compute service matrix
        id: filter
        run: |
          services_all='[
            {"name":"client","dockerfile":"apps/client/Dockerfile","paths":"apps/client"},
            {"name":"server","dockerfile":"apps/server/Dockerfile","paths":"apps/server"}
          ]'

          override='${{ github.event.inputs.services }}'
          if [ -n "$override" ]; then
            echo "matrix=$(echo "$services_all" | jq -c --arg list "$override" '[.[] | select(.name as $n | ($list | split(",")) | index($n))]')" >> "$GITHUB_OUTPUT"
            echo "any=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" 2>/dev/null || git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$changed"

          picked='[]'
          for row in $(echo "$services_all" | jq -c '.[]'); do
            name=$(echo "$row" | jq -r '.name')
            paths=$(echo "$row" | jq -r '.paths')
            for p in $paths; do
              if echo "$changed" | grep -q "^$p/"; then
                picked=$(echo "$picked" | jq -c --argjson svc "$row" '. + [$svc]')
                break
              fi
            done
          done

          if echo "$changed" | grep -qE '^(\.github/workflows/enclii-build\.yml|infra/k8s/production/)'; then
            picked="$services_all"
          fi

          # Always compact before emitting — services_all is pretty-printed
          # in the source for readability, but GITHUB_OUTPUT rejects multiline
          # values without a heredoc-style delimiter.
          picked_compact=$(echo "$picked" | jq -c .)

          echo "matrix=$picked_compact" >> "$GITHUB_OUTPUT"
          echo "any=$(echo "$picked_compact" | jq 'length > 0')" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.service.name }}
    needs: detect-changes
    if: needs.detect-changes.outputs.any == 'true'
    runs-on: ${{ vars.ARC_BOOTSTRAP_COMPLETE == 'true' && 'madfam-runners-blue' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    outputs:
      digests: ${{ steps.collect.outputs.digests }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.2.3'

      - name: Build & push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ghcr.io/madfam-org/accionables-madlab-${{ matrix.service.name }}:${{ github.sha }}
            ghcr.io/madfam-org/accionables-madlab-${{ matrix.service.name }}:main
          labels: |
            org.opencontainers.image.source=https://github.com/madfam-org/accionables-madlab
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

      - name: Sign image (keyless, Fulcio/Rekor)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes "ghcr.io/madfam-org/accionables-madlab-${{ matrix.service.name }}@${{ steps.build.outputs.digest }}"

      - name: Emit digest artifact
        id: collect
        run: |
          mkdir -p digests
          printf '%s=%s\n' "${{ matrix.service.name }}" "${{ steps.build.outputs.digest }}" > "digests/${{ matrix.service.name }}.txt"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.service.name }}
          path: digests/

  update-manifest:
    name: Commit digest to kustomization.yaml
    needs: build
    if: needs.build.result == 'success'
    runs-on: ${{ vars.ARC_BOOTSTRAP_COMPLETE == 'true' && 'madfam-runners-blue' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.ENCLII_DEPLOY_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Download all digest artifacts
        uses: actions/download-artifact@v4
        with:
          path: digests
          pattern: digest-*
          merge-multiple: true

      - name: Update kustomize image digests
        run: |
          cd infra/k8s/production
          for f in ../../../digests/*.txt; do
            line=$(cat "$f")
            name="${line%%=*}"
            digest="${line#*=}"
            echo "Pinning $name to $digest"
            kustomize edit set image "ghcr.io/madfam-org/accionables-madlab-${name}=ghcr.io/madfam-org/accionables-madlab-${name}@${digest}"
          done

      - name: Commit & push digest update
        run: |
          git config user.name "madlab-ci[bot]"
          git config user.email "ci@madlab.quest"
          if git diff --quiet infra/k8s/production/kustomization.yaml; then
            echo "No digest changes to commit."
            exit 0
          fi
          git add infra/k8s/production/kustomization.yaml
          git commit -m "ci: pin image digests from ${{ github.sha }}"
          git push

      - name: Notify enclii lifecycle
        if: env.ENCLII_API_URL != ''
        env:
          ENCLII_API_URL: ${{ secrets.ENCLII_API_URL }}
          ENCLII_DEPLOY_TOKEN: ${{ secrets.ENCLII_DEPLOY_TOKEN }}
        run: |
          curl -sS -X POST "$ENCLII_API_URL/v1/callbacks/lifecycle-event" \
            -H "Authorization: Bearer $ENCLII_DEPLOY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"project":"accionables-madlab","commit":"${{ github.sha }}","event":"image-digest-committed"}' || true
