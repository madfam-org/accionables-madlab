# nginx.conf — runs as nginx:alpine under K8s with runAsNonRoot.
# No `user` directive (we run as uid 101 already; master never needs to drop).
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  server_tokens off;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css text/javascript application/javascript application/json application/xml+rss image/svg+xml;

  # Upstream resolved via in-cluster DNS. If the server isn't up yet
  # (bootstrap scenario), nginx will 502 on /api/*; the SPA itself still
  # serves fine from the static assets.
  upstream madlab_server {
    server madlab-server.madlab.svc.cluster.local:80 max_fails=3 fail_timeout=30s;
    keepalive 8;
  }

  # Resolver for in-cluster DNS. Without this, nginx resolves upstream
  # hostnames at config-parse time and crashes if the service doesn't
  # exist yet. `valid=10s` keeps the cache short so transient DNS issues
  # self-heal quickly.
  resolver kube-dns.kube-system.svc.cluster.local valid=10s ipv6=off;
  resolver_timeout 5s;

  server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    location = /health {
      access_log off;
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }

    location /api/ {
      # Using a variable forces runtime resolution via the resolver above,
      # so nginx doesn't die if the upstream is temporarily gone.
      set $upstream_api "http://madlab_server";
      proxy_pass $upstream_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 10s;
      proxy_send_timeout 30s;
      proxy_read_timeout 30s;
    }

    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|webp|ico)$ {
      expires 1y;
      access_log off;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }

    location / {
      try_files $uri $uri/ /index.html;
      expires -1;
      add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
  }
}
