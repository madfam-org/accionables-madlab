# Re-target server envFrom to the staging secret. Staging never reads
# production secrets. The -staging Secret is provisioned via switchyard-api
# (or via the Selva flow per internal-devops/templates/vault/) when the
# staging namespace is bootstrapped.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: madlab-server
spec:
  template:
    spec:
      containers:
        - name: server
          envFrom:
            - secretRef:
                name: madlab-server-secrets-staging
