apiVersion: apps/v1
kind: Deployment
metadata:
  name: madlab-client
  namespace: madlab
  labels:
    app: madlab-client
    app.kubernetes.io/name: madlab-client
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: madfam-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: madlab-client
  template:
    metadata:
      labels:
        app: madlab-client
        app.kubernetes.io/name: madlab-client
        app.kubernetes.io/part-of: madfam-platform
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
        - name: client
          image: ghcr.io/madfam-org/accionables-madlab-client:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            runAsNonRoot: true
            capabilities:
              drop: [ALL]
              add: [NET_BIND_SERVICE]
          startupProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 3
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            periodSeconds: 30
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
