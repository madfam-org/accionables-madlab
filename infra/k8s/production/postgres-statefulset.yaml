apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: madlab-postgres
  namespace: madlab
  labels:
    app: madlab-postgres
spec:
  serviceName: madlab-postgres
  replicas: 1
  selector:
    matchLabels:
      app: madlab-postgres
  template:
    metadata:
      labels:
        app: madlab-postgres
    spec:
      securityContext:
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: docker.io/library/postgres:16-alpine
          securityContext:
            # Kyverno autogen-drop-all-capabilities requires drop:[ALL].
            # Postgres's initdb (first boot on empty PVC) needs CHOWN +
            # SETGID + SETUID + FOWNER + DAC_OVERRIDE to fix ownership
            # on the data dir before dropping to uid 999. These are the
            # same caps the enclii platform postgres uses (see
            # enclii/infra/k8s/platform-infra/postgres.yaml).
            allowPrivilegeEscalation: false
            privileged: false
            capabilities:
              drop: [ALL]
              add: [CHOWN, DAC_OVERRIDE, FOWNER, SETGID, SETUID]
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: accionables-madlab-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: accionables-madlab-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: accionables-madlab-secrets
                  key: POSTGRES_DB
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: [pg_isready, -U, madlab]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: [pg_isready, -U, madlab]
            initialDelaySeconds: 30
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: longhorn
        resources:
          requests:
            storage: 5Gi
