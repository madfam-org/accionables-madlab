# MADLAB Secrets Template — NEVER commit with real values.
#
# Bootstrap (operator runs this once per cluster):
#   POSTGRES_PW=$(openssl rand -hex 24)
#   SESSION_SECRET=$(openssl rand -hex 32)
#   kubectl create secret generic accionables-madlab-secrets \
#     --namespace=madlab \
#     --from-literal=POSTGRES_USER=madlab \
#     --from-literal=POSTGRES_PASSWORD="$POSTGRES_PW" \
#     --from-literal=POSTGRES_DB=madlab \
#     --from-literal=DATABASE_URL="postgresql://madlab:${POSTGRES_PW}@madlab-postgres.madlab.svc.cluster.local:5432/madlab" \
#     --from-literal=NODE_ENV=production \
#     --from-literal=SESSION_SECRET="$SESSION_SECRET" \
#     --from-literal=ALLOWED_ORIGINS=https://madlab.quest \
#     --from-literal=JANUA_ISSUER=https://auth.madfam.io \
#     --from-literal=JANUA_AUDIENCE=madlab-api \
#     --from-literal=JANUA_JWKS_URI=https://auth.madfam.io/.well-known/jwks.json \
#     --from-literal=AI_PROVIDER=mock
---
apiVersion: v1
kind: Secret
metadata:
  name: accionables-madlab-secrets
  namespace: madlab
type: Opaque
stringData:
  POSTGRES_USER: "madlab"
  POSTGRES_PASSWORD: ""
  POSTGRES_DB: "madlab"
  DATABASE_URL: "postgresql://madlab:<PASSWORD>@madlab-postgres.madlab.svc.cluster.local:5432/madlab"
  NODE_ENV: "production"
  SESSION_SECRET: ""
  ALLOWED_ORIGINS: "https://madlab.quest"
  JANUA_ISSUER: "https://auth.madfam.io"
  JANUA_AUDIENCE: "madlab-api"
  JANUA_JWKS_URI: "https://auth.madfam.io/.well-known/jwks.json"
  AI_PROVIDER: "mock"
  GROQ_API_KEY: ""
  GROQ_MODEL: ""
  OLLAMA_BASE_URL: ""
  OLLAMA_MODEL: ""
  TOGETHER_API_KEY: ""
  TOGETHER_MODEL: ""
  AI_BASE_URL: ""
  AI_API_KEY: ""
  AI_MODEL: ""
